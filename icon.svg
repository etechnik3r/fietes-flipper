<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- App-Icon: FF-Monogramm (Fietes Flipper) - themen-neutral, Palette wie im Spiel -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a6fd8"/>
      <stop offset="1" stop-color="#1d2c54"/>
    </linearGradient>
    <linearGradient id="glanz" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.45" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <rect width="100" height="100" rx="22" fill="url(#glanz)"/>
  <rect x="4" y="4" width="92" height="92" rx="18" fill="none" stroke="#f3c44a" stroke-width="4"/>
  <text x="33" y="59" font-family="'Baloo 2', 'Trebuchet MS', sans-serif" font-size="52"
        font-weight="800" fill="#ffffff" text-anchor="middle" dominant-baseline="central"
        style="text-shadow:0 2px 3px rgba(0,0,0,0.35)">F</text>
  <text x="67" y="59" font-family="'Baloo 2', 'Trebuchet MS', sans-serif" font-size="52"
        font-weight="800" fill="#f3c44a" text-anchor="middle" dominant-baseline="central">F</text>
</svg>
